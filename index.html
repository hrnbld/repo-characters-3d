<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Hello Affan & Umar!</title>
<style>
body{font-family:Arial,sans-serif;background:linear-gradient(135deg,#1a1a2e,#16213e);text-align:center;min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;color:white;margin:0}
h1{font-size:3rem;background:linear-gradient(45deg,#ff6b9d,#4ecdc4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:10px}
h2{color:#fff;font-size:2rem;text-shadow:0 0 20px rgba(78,205,196,.8)}
.char{display:inline-block;width:120px;height:150px;margin:20px;position:relative;cursor:pointer;transition:transform .3s}
.char:hover{transform:scale(1.1)}
.circ{width:80px;height:100px;border-radius:40px;margin:0 auto;position:relative;box-shadow:0 5px 20px rgba(0,0,0,.3)}
.pink{background:#ff6b9d}.blue{background:#4ecdc4}.yellow{background:#f8b500}
.eye{width:15px;height:18px;background:white;border-radius:50%;position:absolute;top:30px;box-shadow:0 2px 5px rgba(0,0,0,.2)}
.eye::after{content:'';width:7px;height:9px;background:#333;border-radius:50%;position:absolute;top:5px;left:4px}
.l{left:20px}.r{right:20px}
.btn{background:rgba(255,255,255,.1);color:#fff;border:2px solid rgba(255,255,255,.2);padding:15px 30px;border-radius:30px;font-size:1rem;cursor:pointer;margin:10px;transition:.3s}
.btn:hover{background:rgba(255,255,255,.2);border-color:#ff6b9d;transform:translateY(-3px)}
</style>
</head>
<body>
<h1>R.E.P.O. Friends</h1>
<h2>👋 Hello Affan & Umar! 👋</h2>
<div>
<div class="char" onclick="this.style.transform='translateY(-20px)';setTimeout(()=>this.style.transform='',300)">
<div class="circ pink"><div class="eye l"></div><div class="eye r"></div></div>
</div>
<div class="char" onclick="this.style.transform='translateY(-20px)';setTimeout(()=>this.style.transform='',300)">
<div class="circ blue"><div class="eye l"></div><div class="eye r"></div></div>
</div>
<div class="char" onclick="this.style.transform='translateY(-20px)';setTimeout(()=>this.style.transform='',300)">
<div class="circ yellow"><div class="eye l"></div><div class="eye r"></div></div>
</div>
</div>
<br><br>
<button class="btn" onclick="alert('Hello Affan & Umar! 🎉')">🎮 Say Hello!</button>
<button class="btn" onclick="for(let i=0;i<10;i++){const h=document.createElement('div');h.innerHTML='❤️';h.style.position='fixed';h.style.left=Math.random()*100+'vw';h.style.top='50%';h.style.fontSize='2rem';h.style.animation='float 2s ease-out';document.body.appendChild(h);setTimeout(()=>h.remove(),2000)}">✨ Hearts!</button>
</body>
</html>
