<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello Affan & Umar! 🎮</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            overflow: hidden;
        }
        
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        .title {
            font-size: clamp(2rem, 6vw, 4rem);
            font-weight: 900;
            background: linear-gradient(45deg, #ff6b9d, #c44569, #f8b500, #4ecdc4);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradient-shift 3s ease infinite;
            text-align: center;
            margin-bottom: 10px;
            letter-spacing: -2px;
        }
        
        @keyframes gradient-shift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        
        .names {
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            font-weight: 800;
            color: #fff;
            text-shadow: 0 0 20px rgba(78, 205, 196, 0.8);
            margin-bottom: 30px;
            animation: glow 2s ease-in-out infinite alternate;
            text-align: center;
        }
        
        @keyframes glow {
            from { text-shadow: 0 0 20px rgba(78, 205, 196, 0.8); }
            to { text-shadow: 0 0 40px rgba(78, 205, 196, 1), 0 0 60px rgba(255, 107, 157, 0.8); }
        }
        
        .characters {
            display: flex;
            gap: 30px;
            justify-content: center;
            flex-wrap: wrap;
            margin: 30px 0;
        }
        
        .character {
            width: 150px;
            height: 200px;
            position: relative;
            cursor: pointer;
            transition: transform 0.3s ease;
        }
        
        .character:hover {
            transform: scale(1.1);
        }
        
        .character.jump {
            animation: jump 0.5s ease;
        }
        
        @keyframes jump {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-30px); }
        }
        
        /* Character 1 - Pink with round hat */
        .char1 .body {
            width: 100px;
            height: 120px;
            background: linear-gradient(145deg, #ff6b9d, #ff8fab);
            border-radius: 50px 50px 40px 40px;
            position: absolute;
            bottom: 30px;
            left: 25px;
            box-shadow: 0 10px 30px rgba(255, 107, 157, 0.4);
        }
        
        .char1 .belly {
            width: 60px;
            height: 50px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            position: absolute;
            bottom: 50px;
            left: 45px;
        }
        
        .char1 .eye {
            width: 20px;
            height: 25px;
            background: white;
            border-radius: 50%;
            position: absolute;
            top: 40px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        
        .char1 .eye::after {
            content: '';
            width: 10px;
            height: 12px;
            background: #333;
            border-radius: 50%;
            position: absolute;
            top: 8px;
            left: 5px;
        }
        
        .char1 .eye.left { left: 45px; }
        .char1 .eye.right { right: 45px; }
        
        .char1 .cheek {
            width: 15px;
            height: 10px;
            background: rgba(255, 150, 150, 0.6);
            border-radius: 50%;
            position: absolute;
            top: 70px;
        }
        
        .char1 .cheek.left { left: 35px; }
        .char1 .cheek.right { right: 35px; }
        
        .char1 .hat {
            width: 60px;
            height: 40px;
            background: linear-gradient(145deg, #333, #555);
            border-radius: 30px 30px 0 0;
            position: absolute;
            top: 0;
            left: 45px;
        }
        
        .char1 .hat::after {
            content: '';
            width: 80px;
            height: 10px;
            background: #333;
            border-radius: 5px;
            position: absolute;
            bottom: -5px;
            left: -10px;
        }
        
        .char1 .arm {
            width: 15px;
            height: 40px;
            background: #ff6b9d;
            border-radius: 10px;
            position: absolute;
            top: 80px;
            transform-origin: top center;
        }
        
        .char1 .arm.left {
            left: 20px;
            transform: rotate(30deg);
            animation: wave-left 2s ease-in-out infinite;
        }
        
        .char1 .arm.right {
            right: 20px;
            transform: rotate(-30deg);
            animation: wave-right 2s ease-in-out infinite;
        }
        
        @keyframes wave-left {
            0%, 100% { transform: rotate(30deg); }
            50% { transform: rotate(50deg); }
        }
        
        @keyframes wave-right {
            0%, 100% { transform: rotate(-30deg); }
            50% { transform: rotate(-50deg); }
        }
        
        .char1 .leg {
            width: 18px;
            height: 30px;
            background: #ff6b9d;
            border-radius: 10px;
            position: absolute;
            bottom: 0;
        }
        
        .char1 .leg.left { left: 35px; }
        .char1 .leg.right { right: 35px; }
        
        /* Character 2 - Cyan with tall hat */
        .char2 .body {
            width: 100px;
            height: 120px;
            background: linear-gradient(145deg, #4ecdc4, #45b7aa);
            border-radius: 50px 50px 40px 40px;
            position: absolute;
            bottom: 30px;
            left: 25px;
            box-shadow: 0 10px 30px rgba(78, 205, 196, 0.4);
        }
        
        .char2 .belly {
            width: 60px;
            height: 50px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            position: absolute;
            bottom: 50px;
            left: 45px;
        }
        
        .char2 .eye {
            width: 22px;
            height: 28px;
            background: white;
            border-radius: 50%;
            position: absolute;
            top: 40px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        
        .char2 .eye::after {
            content: '';
            width: 11px;
            height: 14px;
            background: #333;
            border-radius: 50%;
            position: absolute;
            top: 8px;
            left: 5px;
        }
        
        .char2 .eye.left { left: 43px; }
        .char2 .eye.right { right: 43px; }
        
        .char2 .cheek {
            width: 15px;
            height: 10px;
            background: rgba(255, 150, 150, 0.6);
            border-radius: 50%;
            position: absolute;
            top: 70px;
        }
        
        .char2 .cheek.left { left: 33px; }
        .char2 .cheek.right { right: 33px; }
        
        .char2 .hat {
            width: 40px;
            height: 50px;
            background: linear-gradient(145deg, #8b4513, #a0522d);
            border-radius: 5px;
            position: absolute;
            top: -15px;
            left: 55px;
        }
        
        .char2 .hat::after {
            content: '';
            width: 60px;
            height: 12px;
            background: #8b4513;
            border-radius: 6px;
            position: absolute;
            bottom: -6px;
            left: -10px;
        }
        
        .char2 .arm {
            width: 15px;
            height: 40px;
            background: #4ecdc4;
            border-radius: 10px;
            position: absolute;
            top: 80px;
            transform-origin: top center;
        }
        
        .char2 .arm.left {
            left: 20px;
            transform: rotate(20deg);
            animation: pat-left 1.5s ease-in-out infinite;
        }
        
        .char2 .arm.right {
            right: 20px;
            transform: rotate(-20deg);
            animation: pat-right 1.5s ease-in-out infinite;
        }
        
        @keyframes pat-left {
            0%, 100% { transform: rotate(20deg); }
            50% { transform: rotate(40deg); }
        }
        
        @keyframes pat-right {
            0%, 100% { transform: rotate(-20deg); }
            50% { transform: rotate(-40deg); }
        }
        
        .char2 .leg {
            width: 18px;
            height: 30px;
            background: #4ecdc4;
            border-radius: 10px;
            position: absolute;
            bottom: 0;
        }
        
        .char2 .leg.left { left: 35px; }
        .char2 .leg.right { right: 35px; }
        
        /* Character 3 - Yellow with propeller hat */
        .char3 .body {
            width: 100px;
            height: 120px;
            background: linear-gradient(145deg, #f8b500, #ffa700);
            border-radius: 50px 50px 40px 40px;
            position: absolute;
            bottom: 30px;
            left: 25px;
            box-shadow: 0 10px 30px rgba(248, 181, 0, 0.4);
        }
        
        .char3 .belly {
            width: 60px;
            height: 50px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            position: absolute;
            bottom: 50px;
            left: 45px;
        }
        
        .char3 .eye {
            width: 20px;
            height: 25px;
            background: white;
            border-radius: 50%;
            position: absolute;
            top: 40px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        
        .char3 .eye::after {
            content: '';
            width: 10px;
            height: 12px;
            background: #333;
            border-radius: 50%;
            position: absolute;
            top: 8px;
            left: 5px;
        }
        
        .char3 .eye.left { left: 45px; }
        .char3 .eye.right { right: 45px; }
        
        .char3 .cheek {
            width: 15px;
            height: 10px;
            background: rgba(255, 150, 150, 0.6);
            border-radius: 50%;
            position: absolute;
            top: 70px;
        }
        
        .char3 .cheek.left { left: 35px; }
        .char3 .cheek.right { right: 35px; }
        
        .char3 .hat {
            width: 50px;
            height: 35px;
            background: linear-gradient(145deg, #22d3ee, #06b6d4);
            border-radius: 25px 25px 0 0;
            position: absolute;
            top: 5px;
            left: 50px;
        }
        
        .char3 .propeller {
            width: 80px;
            height: 8px;
            background: #ff6b6b;
            border-radius: 4px;
            position: absolute;
            top: 0;
            left: 35px;
            animation: spin 0.5s linear infinite;
        }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .char3 .hat::after {
            content: '';
            width: 70px;
            height: 10px;
            background: #22d3ee;
            border-radius: 5px;
            position: absolute;
            bottom: -5px;
            left: -10px;
        }
        
        .char3 .arm {
            width: 15px;
            height: 40px;
            background: #f8b500;
            border-radius: 10px;
            position: absolute;
            top: 80px;
            transform-origin: top center;
            animation: dance-arm 1s ease-in-out infinite;
        }
        
        .char3 .arm.left {
            left: 20px;
            transform: rotate(40deg);
            animation-delay: 0s;
        }
        
        .char3 .arm.right {
            right: 20px;
            transform: rotate(-40deg);
            animation-delay: 0.5s;
        }
        
        @keyframes dance-arm {
            0%, 100% { transform: rotate(40deg); }
            50% { transform: rotate(70deg); }
        }
        
        .char3 .leg {
            width: 18px;
            height: 30px;
            background: #f8b500;
            border-radius: 10px;
            position: absolute;
            bottom: 0;
            animation: dance-leg 0.5s ease-in-out infinite;
        }
        
        .char3 .leg.left { 
            left: 35px;
            animation-delay: 0s;
        }
        
        .char3 .leg.right { 
            right: 35px;
            animation-delay: 0.25s;
        }
        
        @keyframes dance-leg {
            0%, 100% { height: 30px; }
            50% { height: 20px; }
        }
        
        /* Floating particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: -1;
        }
        
        .particle {
            position: absolute;
            width: 10px;
            height: 10px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            animation: float 10s infinite linear;
        }
        
        @keyframes float {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% {
                transform: translateY(-100px) rotate(720deg);
                opacity: 0;
            }
        }
        
        .controls {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 30px;
        }
        
        .btn {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: #ff6b9d;
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(255, 107, 157, 0.3);
        }
        
        .btn.primary {
            background: linear-gradient(135deg, #ff6b9d, #c44569);
            border: none;
        }
        
        .btn.primary:hover {
            background: linear-gradient(135deg, #ff8fab, #d65a7a);
        }
        
        .message {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%) scale(0);
            background: white;
            color: #1a1a2e;
            padding: 20px 40px;
            border-radius: 30px;
            font-size: 1.5rem;
            font-weight: 700;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            z-index: 100;
            transition: transform 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }
        
        .message.show {
            transform: translateX(-50%) scale(1);
        }
        
        .message::after {
            content: '';
            position: absolute;
            bottom: -15px;
            left: 50%;
            transform: translateX(-50%);
            border: 15px solid transparent;
            border-top-color: white;
        }
        
        .heart {
            position: fixed;
            color: #ff6b9d;
            font-size: 2rem;
            animation: float-up 3s ease-out forwards;
            pointer-events: none;
            z-index: 50;
        }
        
        @keyframes float-up {
            0% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateY(-200px) scale(0.5);
            }
        }
        
        @media (max-width: 600px) {
            .character {
                width: 120px;
                height: 160px;
            }
            .character .body {
                transform: scale(0.8);
            }
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>
    
    <div class="container">
        <h1 class="title">R.E.P.O. Friends</h1>
        <p class="names">👋 Hello Affan & Umar! 👋</p>
        
        <div class="characters">
            <div class="character char1" onclick="jump(this)">
                <div class="hat"></div>
                <div class="eye left"></div>
                <div class="eye right"></div>
                <div class="cheek left"></div>
                <div class="cheek right"></div>
                <div class="body"></div>
                <div class="belly"></div>
                <div class="arm left"></div>
                <div class="arm right"></div>
                <div class="leg left"></div>
                <div class="leg right"></div>
            </div>
            
            <div class="character char2" onclick="jump(this)">
                <div class="hat"></div>
                <div class="eye left"></div>
                <div class="eye right"></div>
                <div class="cheek left"></div>
                <div class="cheek right"></div>
                <div class="body"></div>
                <div class="belly"></div>
                <div class="arm left"></div>
                <div class="arm right"></div>
                <div class="leg left"></div>
                <div class="leg right"></div>
            </div>
            
            <div class="character char3" onclick="jump(this)">
                <div class="hat">
                    <div class="propeller"></div>
                </div>
                <div class="eye left"></div>
                <div class="eye right"></div>
                <div class="cheek left"></div>
                <div class="cheek right"></div>
                <div class="body"></div>
                <div class="belly"></div>
                <div class="arm left"></div>
                <div class="arm right"></div>
                <div class="leg left"></div>
                <div class="leg right"></div>
            </div>
        </div>
        
        <div class="controls">
            <button class="btn primary" onclick="sayHello()">🎮 Say Hello!</button>
            <button class="btn" onclick="spawnHearts()">✨ Confetti!</button>
            <button class="btn" onclick="toggleDance()">💃 Dance!</button>
        </div>
    </div>
    
    <div class="message" id="message">Welcome to the adventure! 🎉</div>

    <script>
        // Create floating particles
        function createParticles() {
            const container = document.getElementById('particles');
            const colors = ['#ff6b9d', '#4ecdc4', '#f8b500', '#a855f7', '#ff6b6b'];
            
            for (let i = 0; i < 30; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 10 + 's';
                particle.style.background = colors[Math.floor(Math.random() * colors.length)];
                particle.style.width = (5 + Math.random() * 10) + 'px';
                particle.style.height = particle.style.width;
                container.appendChild(particle);
            }
        }
        
        createParticles();
        
        // Jump animation
        function jump(element) {
            element.classList.remove('jump');
            void element.offsetWidth; // Trigger reflow
            element.classList.add('jump');
            
            setTimeout(() => {
                element.classList.remove('jump');
            }, 500);
        }
        
        // Say hello with message
        function sayHello() {
            const messages = [
                "Hello Affan & Umar! 🎉",
                "You are awesome! ⭐",
                "Let's play! 🚀",
                "Best brothers ever! 💖",
                "Welcome adventurers! 🎮"
            ];
            
            const msg = document.getElementById('message');
            msg.textContent = messages[Math.floor(Math.random() * messages.length)];
            msg.classList.add('show');
            
            // Make all characters jump
            document.querySelectorAll('.character').forEach((char, i) => {
                setTimeout(() => jump(char), i * 100);
            });
            
            setTimeout(() => {
                msg.classList.remove('show');
            }, 3000);
            
            spawnHearts();
        }
        
        // Spawn floating hearts
        function spawnHearts() {
            for (let i = 0; i < 15; i++) {
                setTimeout(() => {
                    const heart = document.createElement('div');
                    heart.className = 'heart';
                    heart.innerHTML = ['❤️', '💖', '💕', '💗', '💝'][Math.floor(Math.random() * 5)];
                    heart.style.left = (20 + Math.random() * 60) + '%';
                    heart.style.top = (40 + Math.random() * 40) + '%';
                    document.body.appendChild(heart);
                    
                    setTimeout(() => heart.remove(), 3000);
                }, i * 100);
            }
        }
        
        // Toggle dance mode
        let isDancing = false;
        function toggleDance() {
            isDancing = !isDancing;
            document.body.style.animation = isDancing ? 'pulse 0.5s ease-in-out infinite' : '';
            
            document.querySelectorAll('.character').forEach(char => {
                if (isDancing) {
                    char.style.animation = 'jump 0.3s ease-in-out infinite';
                } else {
                    char.style.animation = '';
                }
            });
        }
        
        // Add pulse animation
        const style = document.createElement('style');
        style.textContent = `
            @keyframes pulse {
                0%, 100% { transform: scale(1); }
                50% { transform: scale(1.02); }
            }
        `;
        document.head.appendChild(style);
        
        // Click anywhere to spawn hearts
        document.addEventListener('click', (e) => {
            if (e.target.tagName !== 'BUTTON' && !e.target.closest('.character')) {
                spawnHearts();
            }
        });
    </script>
</body>
</html>
