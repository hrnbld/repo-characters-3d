<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello Affan & Umar! 🎮</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            overflow: hidden;
        }
        
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        
        .ui-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 30px;
        }
        
        .header {
            text-align: center;
            pointer-events: auto;
        }
        
        .title {
            font-size: clamp(2rem, 6vw, 4rem);
            font-weight: 900;
            background: linear-gradient(45deg, #ff6b9d, #c44569, #f8b500, #4ecdc4);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradient-shift 5s ease infinite;
            text-shadow: 0 0 60px rgba(255, 107, 157, 0.5);
            margin-bottom: 10px;
            letter-spacing: -2px;
        }
        
        @keyframes gradient-shift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        
        .subtitle {
            color: rgba(255, 255, 255, 0.8);
            font-size: clamp(1rem, 2vw, 1.5rem);
            font-weight: 300;
            letter-spacing: 3px;
            text-transform: uppercase;
        }
        
        .names {
            font-size: clamp(1.5rem, 4vw, 3rem);
            font-weight: 800;
            color: #fff;
            text-shadow: 0 0 20px rgba(78, 205, 196, 0.8), 0 0 40px rgba(78, 205, 196, 0.5);
            margin-top: 20px;
            animation: glow 2s ease-in-out infinite alternate;
        }
        
        @keyframes glow {
            from { text-shadow: 0 0 20px rgba(78, 205, 196, 0.8); }
            to { text-shadow: 0 0 30px rgba(78, 205, 196, 1), 0 0 60px rgba(255, 107, 157, 0.8); }
        }
        
        .controls {
            pointer-events: auto;
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .btn {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: #ff6b9d;
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(255, 107, 157, 0.3);
        }
        
        .btn.primary {
            background: linear-gradient(135deg, #ff6b9d, #c44569);
            border: none;
        }
        
        .btn.primary:hover {
            background: linear-gradient(135deg, #ff8fab, #d65a7a);
        }
        
        .message-bubble {
            position: fixed;
            bottom: 150px;
            left: 50%;
            transform: translateX(-50%) scale(0);
            background: #fff;
            color: #1a1a2e;
            padding: 20px 40px;
            border-radius: 30px;
            font-size: 1.5rem;
            font-weight: 700;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            z-index: 100;
            transition: transform 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            pointer-events: none;
        }
        
        .message-bubble::after {
            content: '';
            position: absolute;
            bottom: -15px;
            left: 50%;
            transform: translateX(-50%);
            border: 15px solid transparent;
            border-top-color: #fff;
        }
        
        .message-bubble.show {
            transform: translateX(-50%) scale(1);
        }
        
        .floating-hearts {
            position: fixed;
            pointer-events: none;
            z-index: 50;
        }
        
        .heart {
            position: absolute;
            color: #ff6b9d;
            font-size: 2rem;
            animation: float-up 3s ease-out forwards;
            opacity: 0;
        }
        
        @keyframes float-up {
            0% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateY(-200px) scale(0.5);
            }
        }
        
        .loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.5s ease;
        }
        
        .loading.hidden {
            opacity: 0;
            pointer-events: none;
        }
        
        .loader {
            width: 80px;
            height: 80px;
            border: 5px solid rgba(255, 255, 255, 0.1);
            border-top-color: #ff6b9d;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="loading" id="loading">
        <div class="loader"></div>
    </div>
    
    <div id="canvas-container"></div>
    
    <div class="ui-overlay">
        <div class="header">
            <h1 class="title">R.E.P.O. Friends</h1>
            <p class="subtitle">Adventure Awaits!</p>
            <div class="names">👋 Hello Affan & Umar! 👋</div>
        </div>
        
        <div class="controls">
            <button class="btn primary" onclick="sayHello()">🎮 Say Hello!</button>
            <button class="btn" onclick="spawnConfetti()">✨ Confetti!</button>
            <button class="btn" onclick="toggleDance()">💃 Dance!</button>
            <button class="btn" onclick="changeColor()">🎨 Colors!</button>
        </div>
    </div>
    
    <div class="message-bubble" id="messageBubble">
        Welcome to the adventure! 🎉
    </div>
    
    <div class="floating-hearts" id="heartsContainer"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // Scene Setup
        const scene = new THREE.Scene();
        scene.fog = new THREE.Fog(0x1a1a2e, 20, 100);
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 15);
        camera.lookAt(0, 2, 0);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.getElementById('canvas-container').appendChild(renderer.domElement);
        
        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        
        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(10, 20, 10);
        directionalLight.castShadow = true;
        directionalLight.shadow.mapSize.width = 2048;
        directionalLight.shadow.mapSize.height = 2048;
        scene.add(directionalLight);
        
        const pointLight1 = new THREE.PointLight(0xff6b9d, 0.8, 30);
        pointLight1.position.set(-5, 5, 5);
        scene.add(pointLight1);
        
        const pointLight2 = new THREE.PointLight(0x4ecdc4, 0.8, 30);
        pointLight2.position.set(5, 5, 5);
        scene.add(pointLight2);
        
        // Ground
        const groundGeometry = new THREE.CircleGeometry(30, 64);
        const groundMaterial = new THREE.MeshStandardMaterial({ 
            color: 0x2d3561,
            roughness: 0.8,
            metalness: 0.2
        });
        const ground = new THREE.Mesh(groundGeometry, groundMaterial);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);
        
        // Characters Group
        const charactersGroup = new THREE.Group();
        scene.add(charactersGroup);
        
        // Character Colors
        const colors = [0xff6b9d, 0x4ecdc4, 0xf8b500, 0xa855f7, 0x22d3ee];
        let currentColorIndex = 0;
        
        // Create Character Function
        function createCharacter(x, z, color, scale = 1, hatType = 'round') {
            const character = new THREE.Group();
            
            // Body - Soft capsule shape
            const bodyGeometry = new THREE.CapsuleGeometry(0.8 * scale, 1.5 * scale, 8, 16);
            const bodyMaterial = new THREE.MeshStandardMaterial({ 
                color: color,
                roughness: 0.3,
                metalness: 0.1
            });
            const body = new THREE.Mesh(bodyGeometry, bodyMaterial);
            body.position.y = 1.5 * scale;
            body.castShadow = true;
            character.add(body);
            
            // Belly - lighter color
            const bellyGeometry = new THREE.SphereGeometry(0.5 * scale, 32, 32);
            const bellyMaterial = new THREE.MeshStandardMaterial({ 
                color: lightenColor(color, 20),
                roughness: 0.5
            });
            const belly = new THREE.Mesh(bellyGeometry, bellyMaterial);
            belly.position.set(0, 1.2 * scale, 0.5 * scale);
            belly.scale.set(1, 0.8, 0.5);
            character.add(belly);
            
            // Eyes
            const eyeGeometry = new THREE.SphereGeometry(0.18 * scale, 32, 32);
            const eyeMaterial = new THREE.MeshStandardMaterial({ color: 0xffffff });
            const pupilMaterial = new THREE.MeshStandardMaterial({ color: 0x000000 });
            
            // Left Eye
            const leftEyeGroup = new THREE.Group();
            const leftEye = new THREE.Mesh(eyeGeometry, eyeMaterial);
            leftEyeGroup.add(leftEye);
            const leftPupil = new THREE.Mesh(new THREE.SphereGeometry(0.08 * scale, 16, 16), pupilMaterial);
            leftPupil.position.z = 0.13 * scale;
            leftEyeGroup.add(leftPupil);
            leftEyeGroup.position.set(-0.25 * scale, 2.2 * scale, 0.6 * scale);
            character.add(leftEyeGroup);
            
            // Right Eye
            const rightEyeGroup = new THREE.Group();
            const rightEye = new THREE.Mesh(eyeGeometry, eyeMaterial);
            rightEyeGroup.add(rightEye);
            const rightPupil = new THREE.Mesh(new THREE.SphereGeometry(0.08 * scale, 16, 16), pupilMaterial);
            rightPupil.position.z = 0.13 * scale;
            rightEyeGroup.add(rightPupil);
            rightEyeGroup.position.set(0.25 * scale, 2.2 * scale, 0.6 * scale);
            character.add(rightEyeGroup);
            
            // Cheeks
            const cheekGeometry = new THREE.CircleGeometry(0.15 * scale, 16);
            const cheekMaterial = new THREE.MeshBasicMaterial({ 
                color: 0xffaaaa,
                transparent: true,
                opacity: 0.6
            });
            const leftCheek = new THREE.Mesh(cheekGeometry, cheekMaterial);
            leftCheek.position.set(-0.5 * scale, 1.8 * scale, 0.75 * scale);
            leftCheek.lookAt(0, 1.8 * scale, 10);
            character.add(leftCheek);
            
            const rightCheek = new THREE.Mesh(cheekGeometry, cheekMaterial);
            rightCheek.position.set(0.5 * scale, 1.8 * scale, 0.75 * scale);
            rightCheek.lookAt(0, 1.8 * scale, 10);
            character.add(rightCheek);
            
            // Hat
            const hatGroup = new THREE.Group();
            if (hatType === 'round') {
                // Round hat
                const hatGeometry = new THREE.SphereGeometry(0.5 * scale, 32, 32, 0, Math.PI * 2, 0, Math.PI / 2);
                const hatMaterial = new THREE.MeshStandardMaterial({ color: 0x333333 });
                const hat = new THREE.Mesh(hatGeometry, hatMaterial);
                hat.position.y = 0.5 * scale;
                hatGroup.add(hat);
                
                const brimGeometry = new THREE.CylinderGeometry(0.6 * scale, 0.6 * scale, 0.1 * scale, 32);
                const brim = new THREE.Mesh(brimGeometry, hatMaterial);
                brim.position.y = 0.2 * scale;
                hatGroup.add(brim);
            } else if (hatType === 'tall') {
                // Tall hat
                const hatGeometry = new THREE.CylinderGeometry(0.3 * scale, 0.4 * scale, 0.8 * scale, 32);
                const hatMaterial = new THREE.MeshStandardMaterial({ color: 0x8b4513 });
                const hat = new THREE.Mesh(hatGeometry, hatMaterial);
                hat.position.y = 0.5 * scale;
                hatGroup.add(hat);
                
                const brimGeometry = new THREE.CylinderGeometry(0.5 * scale, 0.5 * scale, 0.1 * scale, 32);
                const brim = new THREE.Mesh(brimGeometry, hatMaterial);
                brim.position.y = 0.1 * scale;
                hatGroup.add(brim);
            } else if (hatType === 'propeller') {
                // Propeller hat
                const hatGeometry = new THREE.SphereGeometry(0.45 * scale, 32, 32, 0, Math.PI * 2, 0, Math.PI / 2);
                const hatMaterial = new THREE.MeshStandardMaterial({ color: 0x22d3ee });
                const hat = new THREE.Mesh(hatGeometry, hatMaterial);
                hat.position.y = 0.45 * scale;
                hatGroup.add(hat);
                
                const propGeometry = new THREE.BoxGeometry(1 * scale, 0.05 * scale, 0.15 * scale);
                const propMaterial = new THREE.MeshStandardMaterial({ color: 0xff6b6b });
                const propeller = new THREE.Mesh(propGeometry, propMaterial);
                propeller.position.y = 1 * scale;
                hatGroup.add(propeller);
            }
            
            hatGroup.position.set(0, 2.4 * scale, 0);
            character.add(hatGroup);
            character.userData.hat = hatGroup;
            
            // Arms
            const armGeometry = new THREE.CapsuleGeometry(0.2 * scale, 0.8 * scale, 8, 16);
            const leftArm = new THREE.Mesh(armGeometry, bodyMaterial);
            leftArm.position.set(-0.9 * scale, 1.8 * scale, 0);
            leftArm.rotation.z = Math.PI / 4;
            leftArm.castShadow = true;
            character.add(leftArm);
            character.userData.leftArm = leftArm;
            
            const rightArm = new THREE.Mesh(armGeometry, bodyMaterial);
            rightArm.position.set(0.9 * scale, 1.8 * scale, 0);
            rightArm.rotation.z = -Math.PI / 4;
            rightArm.castShadow = true;
            character.add(rightArm);
            character.userData.rightArm = rightArm;
            
            // Legs
            const legGeometry = new THREE.CapsuleGeometry(0.25 * scale, 0.6 * scale, 8, 16);
            const leftLeg = new THREE.Mesh(legGeometry, bodyMaterial);
            leftLeg.position.set(-0.3 * scale, 0.5 * scale, 0);
            leftLeg.castShadow = true;
            character.add(leftLeg);
            character.userData.leftLeg = leftLeg;
            
            const rightLeg = new THREE.Mesh(legGeometry, bodyMaterial);
            rightLeg.position.set(0.3 * scale, 0.5 * scale, 0);
            rightLeg.castShadow = true;
            character.add(rightLeg);
            character.userData.rightLeg = rightLeg;
            
            character.position.set(x, 0, z);
            charactersGroup.add(character);
            
            return character;
        }
        
        // Helper to lighten color
        function lightenColor(hex, percent) {
            const r = (hex >> 16) & 0xff;
            const g = (hex >> 8) & 0xff;
            const b = hex & 0xff;
            return ((Math.min(255, r + (255 - r) * percent / 100)) << 16) |
                   ((Math.min(255, g + (255 - g) * percent / 100)) << 8) |
                   Math.min(255, b + (255 - b) * percent / 100);
        }
        
        // Create Characters
        const char1 = createCharacter(-3, 0, 0xff6b9d, 1, 'round');
        const char2 = createCharacter(0, 0, 0x4ecdc4, 1, 'tall');
        const char3 = createCharacter(3, 0, 0xf8b500, 1, 'propeller');
        
        const characters = [char1, char2, char3];
        
        // Floating Particles
        const particlesGeometry = new THREE.BufferGeometry();
        const particlesCount = 200;
        const posArray = new Float32Array(particlesCount * 3);
        
        for(let i = 0; i < particlesCount * 3; i++) {
            posArray[i] = (Math.random() - 0.5) * 40;
        }
        
        particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        const particlesMaterial = new THREE.PointsMaterial({
            size: 0.1,
            color: 0xffffff,
            transparent: true,
            opacity: 0.6
        });
        const particlesMesh = new THREE.Points(particlesGeometry, particlesMaterial);
        scene.add(particlesMesh);
        
        // Confetti System
        const confetti = [];
        const confettiColors = [0xff6b9d, 0x4ecdc4, 0xf8b500, 0xa855f7, 0x22d3ee];
        
        function createConfettiPiece() {
            const geometry = new THREE.PlaneGeometry(0.3, 0.3);
            const material = new THREE.MeshBasicMaterial({
                color: confettiColors[Math.floor(Math.random() * confettiColors.length)],
                side: THREE.DoubleSide
            });
            const piece = new THREE.Mesh(geometry, material);
            piece.position.set(
                (Math.random() - 0.5) * 10,
                10 + Math.random() * 5,
                (Math.random() - 0.5) * 10
            );
            piece.rotation.set(
                Math.random() * Math.PI,
                Math.random() * Math.PI,
                Math.random() * Math.PI
            );
            piece.userData = {
                velocity: {
                    x: (Math.random() - 0.5) * 0.1,
                    y: -0.05 - Math.random() * 0.1,
                    z: (Math.random() - 0.5) * 0.1
                },
                rotationSpeed: {
                    x: (Math.random() - 0.5) * 0.2,
                    y: (Math.random() - 0.5) * 0.2,
                    z: (Math.random() - 0.5) * 0.2
                }
            };
            return piece;
        }
        
        function spawnConfetti() {
            for(let i = 0; i < 50; i++) {
                const piece = createConfettiPiece();
                scene.add(piece);
                confetti.push(piece);
            }
            
            // Spawn floating hearts
            spawnHearts();
        }
        
        function spawnHearts() {
            const container = document.getElementById('heartsContainer');
            for(let i = 0; i < 20; i++) {
                setTimeout(() => {
                    const heart = document.createElement('div');
                    heart.className = 'heart';
                    heart.innerHTML = '❤️';
                    heart.style.left = (30 + Math.random() * 40) + '%';
                    heart.style.top = (50 + Math.random() * 30) + '%';
                    container.appendChild(heart);
                    setTimeout(() => heart.remove(), 3000);
                }, i * 100);
            }
        }
        
        // Interactive Functions
        let isDancing = false;
        
        function sayHello() {
            const bubble = document.getElementById('messageBubble');
            const messages = [
                "Hello Affan & Umar! 🎉",
                "Welcome to the adventure! 🎮",
                "You're awesome! ⭐",
                "Let's play! 🚀",
                "Best brothers ever! 💖"
            ];
            bubble.textContent = messages[Math.floor(Math.random() * messages.length)];
            bubble.classList.add('show');
            setTimeout(() => bubble.classList.remove('show'), 3000);
            
            // Jump animation
            characters.forEach((char, i) => {
                setTimeout(() => {
                    jump(char);
                }, i * 200);
            });
        }
        
        function jump(character) {
            const startY = 0;
            const jumpHeight = 2;
            const duration = 500;
            const startTime = Date.now();
            
            function animateJump() {
                const elapsed = Date.now() - startTime;
                const progress = Math.min(elapsed / duration, 1);
                
                if (progress < 0.5) {
                    character.position.y = startY + jumpHeight * (progress * 2);
                } else {
                    character.position.y = startY + jumpHeight * (2 - progress * 2);
                }
                
                if (progress < 1) {
                    requestAnimationFrame(animateJump);
                } else {
                    character.position.y = startY;
                }
            }
            animateJump();
        }
        
        function toggleDance() {
            isDancing = !isDancing;
        }
        
        function changeColor() {
            currentColorIndex = (currentColorIndex + 1) % colors.length;
            const newColor = colors[currentColorIndex];
            
            characters.forEach((char, i) => {
                setTimeout(() => {
                    const colorIndex = (currentColorIndex + i) % colors.length;
                    char.children[0].material.color.setHex(colors[colorIndex]);
                }, i * 100);
            });
        }
        
        // Animation Loop
        let time = 0;
        
        function animate() {
            requestAnimationFrame(animate);
            time += 0.02;
            
            // Float characters
            characters.forEach((char, i) => {
                // Basic float
                char.position.y = Math.sin(time + i * 2) * 0.2;
                
                // Dance rotation
                if (isDancing) {
                    char.rotation.y = Math.sin(time * 2 + i) * 0.5;
                    char.userData.leftArm.rotation.z = Math.PI / 4 + Math.sin(time * 3 + i) * 0.5;
                    char.userData.rightArm.rotation.z = -Math.PI / 4 - Math.sin(time * 3 + i) * 0.5;
                } else {
                    char.rotation.y = Math.sin(time * 0.5 + i) * 0.2;
                    char.userData.leftArm.rotation.z = Math.PI / 4 + Math.sin(time + i) * 0.1;
                    char.userData.rightArm.rotation.z = -Math.PI / 4 - Math.sin(time + i) * 0.1;
                }
                
                // Leg swing
                char.userData.leftLeg.rotation.x = Math.sin(time + i) * 0.1;
                char.userData.rightLeg.rotation.x = -Math.sin(time + i) * 0.1;
                
                // Hat wobble
                if (char.userData.hat) {
                    char.userData.hat.rotation.z = Math.sin(time * 2 + i) * 0.05;
                }
            });
            
            // Rotate particles
            particlesMesh.rotation.y += 0.001;
            
            // Update confetti
            for (let i = confetti.length - 1; i >= 0; i--) {
                const piece = confetti[i];
                piece.position.x += piece.userData.velocity.x;
                piece.position.y += piece.userData.velocity.y;
                piece.position.z += piece.userData.velocity.z;
                piece.rotation.x += piece.userData.rotationSpeed.x;
                piece.rotation.y += piece.userData.rotationSpeed.y;
                piece.rotation.z += piece.userData.rotationSpeed.z;
                
                if (piece.position.y < -5) {
                    scene.remove(piece);
                    confetti.splice(i, 1);
                }
            }
            
            renderer.render(scene, camera);
        }
        
        // Resize Handler
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        // Mouse interaction
        let mouseX = 0, mouseY = 0;
        
        document.addEventListener('mousemove', (e) => {
            mouseX = (e.clientX / window.innerWidth) * 2 - 1;
            mouseY = -(e.clientY / window.innerHeight) * 2 + 1;
            
            // Characters look at mouse
            characters.forEach((char, i) => {
                const targetRotationY = mouseX * 0.5;
                char.rotation.y += (targetRotationY - char.rotation.y) * 0.1;
            });
        });
        
        // Click to spawn hearts
        document.addEventListener('click', (e) => {
            if (e.target.tagName !== 'BUTTON') {
                spawnHearts();
            }
        });
        
        // Hide loading
        setTimeout(() => {
            document.getElementById('loading').classList.add('hidden');
        }, 1500);
        
        // Start animation
        animate();
    </script>
</body>
</html>
